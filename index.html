<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Richuncle Attendance</title>
<style>
  :root {
    --ink: #1c2a24;
    --paper: #f6f3ec;
    --moss: #2f5d3a;
    --moss-deep: #1f3f27;
    --clay: #c46b3e;
    --line: #d9d3c4;
    --ok: #2f5d3a;
    --warn: #b3441e;
    --font-display: "Fraunces", Georgia, serif;
    --font-body: "Inter", -apple-system, sans-serif;
    --font-mono: "JetBrains Mono", monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 32px 28px;
    box-shadow: 0 1px 2px rgba(28,42,36,0.04), 0 12px 32px rgba(28,42,36,0.06);
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--moss);
    margin-bottom: 6px;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 28px;
    line-height: 1.15;
    color: var(--moss-deep);
    margin-bottom: 4px;
  }

  .sub {
    font-size: 14px;
    color: #6b6358;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--moss-deep);
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    font-family: var(--font-body);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    background: var(--paper);
    color: var(--ink);
    transition: border-color 0.15s ease;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--moss);
  }

  .status-box {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13.5px;
    line-height: 1.5;
    display: none;
    border: 1px solid var(--line);
  }

  .status-box.show { display: block; }

  .status-box.loading {
    background: #f1efe8;
    color: #6b6358;
  }

  .status-box.ok {
    background: #eaf2ec;
    border-color: #c4dccb;
    color: var(--moss-deep);
  }

  .status-box.warn {
    background: #fbeee6;
    border-color: #ecc8b4;
    color: var(--warn);
  }

  .status-box .dist {
    font-family: var(--font-mono);
    font-size: 12px;
    opacity: 0.75;
    margin-top: 4px;
    display: block;
  }

  button {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: #fff;
    background: var(--moss);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease;
  }

  button:hover:not(:disabled) { background: var(--moss-deep); }
  button:active:not(:disabled) { transform: scale(0.99); }

  button:disabled {
    background: #c9c4b8;
    cursor: not-allowed;
  }

  .footer-note {
    margin-top: 20px;
    font-size: 11.5px;
    color: #a39c8e;
    text-align: center;
    line-height: 1.5;
  }

  .spinner {
    display: inline-block;
    width: 13px;
    height: 13px;
    border: 2px solid #d9d3c4;
    border-top-color: var(--moss);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <div class="card">
    <div class="eyebrow">Richuncle · Attendance</div>
    <h1>Mark attendance</h1>
    <p class="sub">Confirm your location, enter your name, and check in.</p>

    <label for="name">Your name</label>
    <input type="text" id="name" placeholder="e.g. Ama Owusu" autocomplete="name" />

    <div id="locStatus" class="status-box loading show">
      <span class="spinner"></span>Checking your location…
    </div>

    <button id="submitBtn" disabled>Checking location…</button>

    <p class="footer-note">
      Location access is required to confirm you're on-site.<br/>
      If prompted, tap "Allow" to share your location.
    </p>
  </div>

<script>
  // ====== CONFIGURE THIS ======
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLM__1XBF-o1iLp6MohvlTtj51H3cE_VSF8l4Dx867fk36ktuVtgdVF6vszpJAXJO1/exec";
  // =============================

  const locStatus = document.getElementById('locStatus');
  const submitBtn = document.getElementById('submitBtn');
  const nameInput = document.getElementById('name');

  let currentCoords = null;
  let withinRange = false;

  // Mirror of the office locations / radius for instant client-side feedback.
  // (Server re-validates this independently — this is just for UX.)
  const LOCATIONS = [
    { name: "Shop A", lat: 5.548706, lng: -0.207453 },
    { name: "Shop B", lat: 5.550745, lng: -0.205991 }
  ];
  const ALLOWED_RADIUS_M = 9999999;

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function setStatus(type, html) {
    locStatus.className = 'status-box show ' + type;
    locStatus.innerHTML = html;
  }

  function updateButton() {
    if (!currentCoords) {
      submitBtn.disabled = true;
      submitBtn.textContent = "Checking location…";
      return;
    }
    if (!withinRange) {
      submitBtn.disabled = true;
      submitBtn.textContent = "Out of range — cannot check in";
      return;
    }
    submitBtn.disabled = false;
    submitBtn.textContent = "Mark attendance";
  }

  function checkLocation() {
    if (!navigator.geolocation) {
      setStatus('warn', "Your browser doesn't support location access. Please use a modern mobile browser.");
      updateButton();
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };

        let best = null;
        for (const loc of LOCATIONS) {
          const d = Math.round(haversine(loc.lat, loc.lng, currentCoords.lat, currentCoords.lng));
          if (best === null || d < best.dist) best = { name: loc.name, dist: d };
        }
        withinRange = best.dist <= ALLOWED_RADIUS_M;

        if (withinRange) {
          setStatus('ok', `You're at ${best.name}.<span class="dist">Distance: ${best.dist}m (limit ${ALLOWED_RADIUS_M}m)</span>`);
        } else {
          setStatus('warn', `You're too far from any shop to check in.<span class="dist">Closest: ${best.name}, ${best.dist}m (limit ${ALLOWED_RADIUS_M}m)</span>`);
        }
        updateButton();
      },
      (err) => {
        let msg = "Couldn't get your location. ";
        if (err.code === 1) msg += "Please allow location access and reload this page.";
        else if (err.code === 2) msg += "Location unavailable — make sure GPS is on.";
        else msg += "Please try again.";
        setStatus('warn', msg);
        updateButton();
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  submitBtn.addEventListener('click', async () => {
    const name = nameInput.value.trim();
    if (!name) {
      nameInput.focus();
      nameInput.style.borderColor = '#b3441e';
      return;
    }
    if (!currentCoords || !withinRange) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>Submitting…';

    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          name: name,
          lat: currentCoords.lat,
          lng: currentCoords.lng,
          device: navigator.userAgent
        })
      });
      const data = await res.json();

      if (data.success) {
        setStatus('ok', `✓ ${data.message}<span class="dist">Distance: ${data.distance}m</span>`);
        submitBtn.textContent = "Checked in ✓";
        submitBtn.disabled = true;
      } else {
        setStatus('warn', data.error || "Something went wrong. Please try again.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Try again";
      }
    } catch (err) {
      setStatus('warn', "Network error — please check your connection and try again.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Try again";
    }
  });

  checkLocation();
</script>

</body>
</html>
